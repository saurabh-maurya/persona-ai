<div class="toast-container"></div>
<script src="js/common.js?v=2"></script><script>auth.guard();</script>
<script>
let batches = [];
let year = new Date().getFullYear();
let month = new Date().getMonth(); // 0-indexed

async function init() {
  try {
    batches = await api.get('/batches');
    const chars = await api.get('/characters');
    const sel = document.getElementById('filter-character');
    sel.innerHTML = '<option value="">All Characters</option>' +
      chars.map(c => `<option value="${c._id}">${c.name}</option>`).join('');
  } catch (e) {
    toast.error('Failed to load data', e.message);
  }
  render();
}

function shiftMonth(delta) {
  month += delta;
  if (month > 11) { month = 0; year++; }
  if (month < 0)  { month = 11; year--; }
  render();
}

function goToday() {
  const now = new Date();
  year = now.getFullYear();
  month = now.getMonth();
  render();
}

// Parse "YYYY-MM-DD" as local date (avoid UTC shift)
function parseLocal(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function toYMD(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function render() {
  const charFilter = document.getElementById('filter-character').value;
  const filtered = charFilter ? batches.filter(b => b.characterId === charFilter) : batches;

  // Title
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent = `${monthNames[month]} ${year}`;

  // Build day → batches map
  const dayMap = {}; // "YYYY-MM-DD" → [batch,...]

  for (const b of filtered) {
    if (!b.startDate || !b.endDate) continue;
    const start = parseLocal(b.startDate);
    const end   = parseLocal(b.endDate);
    const cur   = new Date(start);
    while (cur <= end) {
      const key = toYMD(cur);
      if (!dayMap[key]) dayMap[key] = [];
      dayMap[key].push(b);
      cur.setDate(cur.getDate() + 1);
    }
  }

  // First day of month
  const firstDay = new Date(year, month, 1);
  // 0=Sun..6=Sat → shift to Mon-start (0=Mon..6=Sun)
  let startOffset = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = toYMD(new Date());

  const DOW = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // Empty cells before day 1
  for (let i = 0; i < startOffset; i++) {
    html += `<div class="cal-cell cal-cell--empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = key === today;
    const dayBatches = dayMap[key] || [];

    // Deduplicate by batch id (a batch covers multiple days, show it once per cell)
    const seen = new Set();
    const unique = dayBatches.filter(b => { if (seen.has(b._id)) return false; seen.add(b._id); return true; });

    const chips = unique.map(b => {
      const label = (b.batchName.length > 18 ? b.batchName.slice(0, 16) + '…' : b.batchName);
      const st = b.status.toLowerCase();
      return `<a class="cal-chip cal-chip--${st}" href="batch-detail.html?id=${b._id}" title="${b.batchName} (${b.characterName})" onclick="event.stopPropagation()">${label}</a>`;
    }).join('');

    html += `
      <div class="cal-cell${isToday ? ' cal-cell--today' : ''}">
        <span class="cal-cell__num${isToday ? ' cal-cell__num--today' : ''}">${d}</span>
        <div class="cal-cell__chips">${chips}</div>
      </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

init();
</script>
