<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Persona AI Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=3" />
</head>
<body>
<div class="app-shell">

  <aside class="sidebar" aria-label="Main navigation">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon">✦</div>
      <div class="sidebar__logo-text">Persona AI<span>Studio v2.0</span></div>
    </div>
    <nav class="sidebar__nav">
      <div class="nav-group__label">Main</div>
      <a href="index.html" class="nav-item active">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        Dashboard
      </a>
      <div class="nav-group__label">Content</div>
      <a href="characters.html" class="nav-item">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
        Characters
      </a>
      <a href="batches.html" class="nav-item">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
        Batches
      </a>
      <a href="calendar.html" class="nav-item">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
        Calendar
      </a>
      <div class="nav-group__label">System</div>
      <a href="settings.html" class="nav-item">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        Settings
      </a>
    </nav>
        <div class="sidebar__footer">
      <button class="sidebar__signout" onclick="auth.logout()">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        Sign Out
      </button>
      <div class="sidebar__version">Persona AI Studio v2.0</div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar__left"><h1 class="topbar__title">Dashboard</h1></div>
      <div class="topbar__actions">
        <div class="topbar__badge">
          <span class="dot dot--pulse"></span>
          <span id="api-status">Connecting…</span>
        </div>
        <button class="btn btn--sm btn--secondary" onclick="loadDashboard()">
          <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <main class="page">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card skeleton" style="height:96px"></div>
        <div class="stat-card skeleton" style="height:96px"></div>
        <div class="stat-card skeleton" style="height:96px"></div>
        <div class="stat-card skeleton" style="height:96px"></div>
      </div>

      <div class="section">
        <div class="section__header">
          <h2 class="section__title">Recent Batches</h2>
          <a href="batches.html" class="btn btn--sm btn--ghost">View all →</a>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Batch</th>
                <th>Character</th>
                <th>Dates</th>
                <th>Days</th>
                <th>Images</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="batches-tbody">
              <tr><td colspan="7"><div class="spinner" style="margin:24px auto"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container"></div>
<script src="js/common.js?v=2"></script><script>auth.guard();</script>
<script>
async function loadDashboard() {
  try {
    const data = await api.get('/dashboard');
    renderStats(data);
    renderBatches(data.recentBatches);
    document.getElementById('api-status').textContent = 'API Online';
  } catch (e) {
    document.getElementById('api-status').textContent = 'API Offline';
    toast.error('Failed to load dashboard', e.message);
  }
}

function renderStats(d) {
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-card__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg></div>
      <div class="stat-card__label">Characters</div>
      <div class="stat-card__value">${fmtNum(d.totalCharacters)}</div>
      <div class="stat-card__sub">${d.activeCharacters} active</div>
    </div>
    <div class="stat-card stat-card--primary">
      <div class="stat-card__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg></div>
      <div class="stat-card__label">Batches</div>
      <div class="stat-card__value">${fmtNum(d.totalBatches)}</div>
      <div class="stat-card__sub">${d.completedBatches} completed</div>
    </div>
    <div class="stat-card stat-card--success">
      <div class="stat-card__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/></svg></div>
      <div class="stat-card__label">Total Descriptions</div>
      <div class="stat-card__value">${fmtNum(d.totalImages)}</div>
      <div class="stat-card__sub">across all batches</div>
    </div>
    <div class="stat-card stat-card--warning">
      <div class="stat-card__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg></div>
      <div class="stat-card__label">Pending</div>
      <div class="stat-card__value">${fmtNum(d.totalBatches - d.completedBatches)}</div>
      <div class="stat-card__sub">batches to generate</div>
    </div>
  `;
}

function renderBatches(batches) {
  const tbody = document.getElementById('batches-tbody');
  if (!batches || !batches.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="table__empty">No batches yet. <a href="batches.html" style="color:var(--color-primary)">Create one →</a></td></tr>`;
    return;
  }
  tbody.innerHTML = batches.map(b => `
    <tr>
      <td><a href="batch-detail.html?id=${b.batchId}" style="color:var(--color-primary);font-weight:500">${b.batchName}</a></td>
      <td>${b.characterName}</td>
      <td style="font-size:var(--text-xs);color:var(--color-text-muted)">${b.startDate} → ${b.endDate}</td>
      <td>${b.totalDays}</td>
      <td>${fmtNum(b.totalImages)}</td>
      <td>${statusBadge(b.status)}</td>
      <td><a href="batch-detail.html?id=${b.batchId}" class="btn btn--sm btn--ghost">View</a></td>
    </tr>
  `).join('');
}

loadDashboard();
setInterval(loadDashboard, 30000);
</script>
</body>
</html>
