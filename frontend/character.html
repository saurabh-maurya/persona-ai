<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=3" />
</head>
<body>
<div class="app-shell">

  <aside class="sidebar" aria-label="Main navigation">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon">✦</div>
      <div class="sidebar__logo-text">Persona AI<span>Studio v2.0</span></div>
    </div>
    <nav class="sidebar__nav">
      <div class="nav-group__label">Main</div>
      <a href="index.html" class="nav-item">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        Dashboard
      </a>
      <div class="nav-group__label">Content</div>
      <a href="characters.html" class="nav-item active">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
        Characters
      </a>
      <a href="batches.html" class="nav-item">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
        Batches
      </a>
      <a href="calendar.html" class="nav-item">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
        Calendar
      </a>
      <div class="nav-group__label">System</div>
      <a href="settings.html" class="nav-item">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        Settings
      </a>
    </nav>
        <div class="sidebar__footer">
      <button class="sidebar__signout" onclick="auth.logout()">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        Sign Out
      </button>
      <div class="sidebar__version">Persona AI Studio v2.0</div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar__left">
        <a href="characters.html" class="btn btn--icon btn--ghost" title="Back to characters">
          <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
        </a>
        <h1 class="topbar__title" id="page-title">Loading…</h1>
      </div>
      <div class="topbar__actions" id="topbar-actions"></div>
    </header>

    <main class="page">
      <div id="content">
        <div class="skeleton" style="height:200px;border-radius:var(--radius-lg);margin-bottom:var(--space-5)"></div>
        <div class="skeleton" style="height:100px;border-radius:var(--radius-lg)"></div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container"></div>
<script src="js/common.js?v=2"></script><script>auth.guard();</script>
<script>
const params = new URLSearchParams(location.search);
const CHAR_ID = params.get('id');
if (!CHAR_ID) { location.href = 'characters.html'; }

let character = null;
let batches = [];

async function init() {
  try {
    [character, batches] = await Promise.all([
      api.get(`/characters/${CHAR_ID}`),
      api.get(`/batches?character_id=${CHAR_ID}`)
    ]);
    render();
  } catch (e) {
    document.getElementById('page-title').textContent = 'Not found';
    document.getElementById('content').innerHTML = `<div class="empty-state">Character not found. <a href="characters.html" style="color:var(--color-primary)">Go back</a></div>`;
  }
}

function render() {
  const c = character;
  document.title = `${c.name} — Persona AI Studio`;
  document.getElementById('page-title').textContent = c.name;

  document.getElementById('topbar-actions').innerHTML = `
    <a href="batches.html?character=${c._id}" class="btn btn--sm btn--ghost">View Batches</a>
    <a href="calendar.html" class="btn btn--sm btn--ghost">Calendar</a>
  `;

  // Stats
  const totalBatches = batches.length;
  const completedBatches = batches.filter(b => b.status === 'COMPLETED').length;
  const totalImages = batches.reduce((s, b) => s + (b.totalImages || 0), 0);
  const lastBatch = batches[0];

  const initials = c.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

  // Profile fields
  function field(label, value) {
    if (!value) return '';
    return `<div class="prof-field">
      <span class="prof-field__label">${label}</span>
      <span class="prof-field__value">${value}</span>
    </div>`;
  }

  const batchRows = batches.length ? batches.map(b => {
    const st = b.status.toLowerCase();
    const days = b.totalDays || 0;
    const imgs = b.totalImages || 0;
    return `
      <div class="batch-row" onclick="window.location='batch-detail.html?id=${b._id}'" style="cursor:pointer">
        <div class="batch-row__info">
          <div class="batch-row__name">${b.batchName}</div>
          <div class="batch-row__meta">
            <span>${b.startDate} → ${b.endDate}</span>
            <span class="sep">·</span>
            <span>${days} day${days !== 1 ? 's' : ''}</span>
            <span class="sep">·</span>
            <span>${imgs} images</span>
          </div>
        </div>
        <div class="batch-row__actions" onclick="event.stopPropagation()">
          <span class="badge badge--${st}">${b.status}</span>
          <a href="batch-detail.html?id=${b._id}" class="btn btn--sm btn--secondary">View</a>
        </div>
      </div>`;
  }).join('') : `<div class="empty-state" style="padding:var(--space-8)">No batches yet for this character. <a href="batches.html" style="color:var(--color-primary)">Create one</a></div>`;

  document.getElementById('content').innerHTML = `
    <!-- Stats strip -->
    <div class="stat-strip">
      <div class="stat-strip__item">
        <div class="stat-strip__val">${totalBatches}</div>
        <div class="stat-strip__label">Total Batches</div>
      </div>
      <div class="stat-strip__item">
        <div class="stat-strip__val">${completedBatches}</div>
        <div class="stat-strip__label">Completed</div>
      </div>
      <div class="stat-strip__item">
        <div class="stat-strip__val">${totalImages.toLocaleString()}</div>
        <div class="stat-strip__label">Total Images</div>
      </div>
      ${lastBatch ? `<div class="stat-strip__item">
        <div class="stat-strip__val" style="font-size:var(--text-sm)">${lastBatch.startDate}</div>
        <div class="stat-strip__label">Last Batch Start</div>
      </div>` : ''}
    </div>

    <!-- Profile card -->
    <div class="section" style="margin-bottom:var(--space-5)">
      <div class="section__header">
        <div style="display:flex;align-items:center;gap:var(--space-4)">
          <div class="char-avatar-lg">${initials}</div>
          <div>
            <h2 class="section__title" style="margin-bottom:var(--space-1)">${c.name}</h2>
            <div style="font-size:var(--text-sm);color:var(--color-text-muted)">${[c.age, c.gender, c.city, c.country].filter(Boolean).join(' · ')}</div>
          </div>
        </div>
        <span class="badge badge--${(c.status||'active').toLowerCase()}">${c.status || 'active'}</span>
      </div>
      <div class="section__body">
        <div class="prof-grid">
          ${field('Niche', c.niche)}
          ${field('Audience', c.audience)}
          ${field('Fashion Style', c.fashionStyle)}
          ${field('Personality', c.persona)}
          ${field('Appearance', c.appearance)}
          ${c.masterPrompt ? field('Master Prompt', c.masterPrompt.slice(0, 200) + (c.masterPrompt.length > 200 ? '…' : '')) : ''}
        </div>
      </div>
    </div>

    <!-- Batch history -->
    <div class="section">
      <div class="section__header">
        <h2 class="section__title">Batch History</h2>
        <a href="batches.html?character=${c._id}" class="btn btn--sm btn--ghost">+ New Batch</a>
      </div>
      <div class="section__body">
        <div class="batch-list">
          ${batchRows}
        </div>
      </div>
    </div>
  `;
}

init();
</script>
</body>
</html>
