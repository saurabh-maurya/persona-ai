version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: persona_mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: persona_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "9001:9001"
    volumes:
      - ./frontend:/frontend:ro
      - ./prompts:/prompts:ro
      - ./backend/prompts:/app/prompts:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
